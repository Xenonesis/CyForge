- id: cf-linux-deploy-template
  name: CyberForge Linux Challenge Deploy Template
  description: Template ability to deploy a Linux-based challenge setup script.
  tactic: execution
  technique:
    attack_id: T1059.004
    name: Unix Shell
  platforms:
    linux:
      sh:
        command: |
          git clone {{ repo_url }} /tmp/cyberforge-challenge
          cd /tmp/cyberforge-challenge
          chmod +x {{ setup_script }}
          ./{{ setup_script }}
