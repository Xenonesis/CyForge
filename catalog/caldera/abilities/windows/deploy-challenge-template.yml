- id: cf-windows-deploy-template
  name: CyberForge Windows Challenge Deploy Template
  description: Template ability to deploy a Windows-based challenge setup script.
  tactic: execution
  technique:
    attack_id: T1059.001
    name: PowerShell
  platforms:
    windows:
      psh:
        command: |
          git clone {{ repo_url }} C:\\Temp\\cyberforge-challenge
          Set-Location C:\\Temp\\cyberforge-challenge
          powershell -ExecutionPolicy Bypass -File .\\{{ setup_script }}
