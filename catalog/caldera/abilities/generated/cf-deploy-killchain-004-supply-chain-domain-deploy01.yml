- id: cf-deploy-killchain-004-supply-chain-domain-deploy01
  name: '[CF] Deploy machine: deploy01 (killchain-004-supply-chain-domain)'
  description: 'Deploy only the deploy01 machine role for killchain killchain-004-supply-chain-domain.

    Role: Windows deploy host | OS: windows | Stack: none'
  tactic: execution
  technique:
    attack_id: T1059.001
    name: PowerShell
  platforms:
    windows:
      psh:
        command: "$ErrorActionPreference = \"Stop\"\nWrite-Host \"[CF] CyberForge\
          \ challenge deploy starting: killchain-004-supply-chain-domain-deploy01\"\
          \n\n# --- Authenticate to GitLab ---\n$GitlabToken = if ($env:GITLAB_TOKEN)\
          \ { $env:GITLAB_TOKEN } elseif (\"#{gitlab.token}\" -ne \"#{gitlab.token}\"\
          ) { \"#{gitlab.token}\" } else { \"\" }\n$RepoUrl = if ($env:REPO_URL) {\
          \ $env:REPO_URL } else { \"https://gitlab.example.com/cyberforge/cyberforge-content.git\"\
          \ }\n\nif ($GitlabToken) {\n  $RepoAuthUrl = $RepoUrl -replace \"https://\"\
          , \"https://oauth2:$($GitlabToken)@\"\n} else {\n  $RepoAuthUrl = $RepoUrl\n\
          }\n\n# --- Sparse-checkout only the challenge directory ---\n$WorkDir =\
          \ \"C:\\\\CyberForge\\\\killchain-004-supply-chain-domain-deploy01\"\nif\
          \ (Test-Path \"$WorkDir\\.git\") {\n  Write-Host '[CF] Updating existing\
          \ clone...'\n  git -C $WorkDir pull --ff-only\n} else {\n  New-Item -ItemType\
          \ Directory -Force -Path $WorkDir | Out-Null\n  git clone --depth 1 --filter=blob:none\
          \ --sparse $RepoAuthUrl $WorkDir\n  git -C $WorkDir sparse-checkout set\
          \ \"killchains/killchain-004-supply-chain-domain/deploy01\"\n}\n\n# ---\
          \ Change into challenge directory ---\nSet-Location \"$WorkDir\\\\killchains\\\
          \\killchain-004-supply-chain-domain\\\\deploy01\"\n\n# --- Run challenge\
          \ setup ---\npowershell -ExecutionPolicy Bypass -File .\\\\deploy01_setup.ps1\n\
          \nWrite-Host \"[CF] Challenge killchain-004-supply-chain-domain-deploy01\
          \ deployed successfully.\""
