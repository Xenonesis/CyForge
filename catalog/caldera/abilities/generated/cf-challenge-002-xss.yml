- id: cf-challenge-002-xss
  name: CyberForge Deploy Cross-Site Scripting Fundamentals
  description: Deploy challenge-002-xss from GitLab content.
  tactic: execution
  technique:
    attack_id: T1059.007
    name: JavaScript
  platforms:
    linux:
      sh:
        command: 'set -e

          REPO_URL="${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}"

          WORKDIR="/tmp/cyberforge-challenge-002-xss"

          if [ -d "$WORKDIR" ]; then rm -rf "$WORKDIR"; fi

          git clone --depth 1 "$REPO_URL" "$WORKDIR"

          cd "$WORKDIR/challenges/challenge-002-xss"

          chmod +x setup.sh

          ./setup.sh'
