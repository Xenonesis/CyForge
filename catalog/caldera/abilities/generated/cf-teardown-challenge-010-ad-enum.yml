- id: cf-teardown-challenge-010-ad-enum
  name: '[CF] Teardown: Active Directory Enumeration'
  description: Cleanly tear down and remove the hosted environment for challenge-010-ad-enum.
  tactic: defense-evasion
  technique:
    attack_id: T1070
    name: Indicator Removal
  platforms:
    windows:
      psh:
        command: "$ErrorActionPreference = \"SilentlyContinue\"\nWrite-Host \"[CF]\
          \ Tearing down: challenge-010-ad-enum\"\n$WorkDir = \"C:\\\\CyberForge\\\
          \\challenge-010-ad-enum\"\nif (Test-Path \"$WorkDir\\\\\" + \"challenges\\\
          \\challenge-010-ad-enum\") {\n  Set-Location \"$WorkDir\\\\\" + \"challenges\\\
          \\challenge-010-ad-enum\"\n  if (Test-Path \".\\\\\" + \"teardown.ps1\"\
          ) {\n    powershell -ExecutionPolicy Bypass -File .\\\\teardown.ps1\n  }\n\
          }\nRemove-Item -Recurse -Force $WorkDir -ErrorAction SilentlyContinue\n\
          Write-Host \"[CF] Teardown complete: challenge-010-ad-enum\""
