- id: cf-killchain-001-web-to-ad-dc01
  name: CyberForge Deploy killchain-001-web-to-ad dc01
  description: Deploy machine dc01 from killchain-001-web-to-ad.
  tactic: execution
  technique:
    attack_id: T1059.001
    name: PowerShell
  platforms:
    windows:
      psh:
        command: '$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else { "https://gitlab.example.com/cyberforge/cyberforge-content.git"
          }

          $WorkDir = "C:\\Temp\\cyberforge-killchain-001-web-to-ad-dc01"

          if (Test-Path $WorkDir) { Remove-Item -Recurse -Force $WorkDir }

          git clone --depth 1 $RepoUrl $WorkDir

          Set-Location "$WorkDir\\killchains\\killchain-001-web-to-ad\\dc01"

          powershell -ExecutionPolicy Bypass -File .\\dc01_setup.ps1'
