- id: cf-teardown-challenge-015-python-powershell
  name: '[CF] Teardown: Python and PowerShell Multi-Stage'
  description: Cleanly tear down and remove the hosted environment for challenge-015-python-powershell.
  tactic: defense-evasion
  technique:
    attack_id: T1070
    name: Indicator Removal
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] Tearing down: challenge-015-python-powershell'\n\
          WORKDIR=\"/opt/cyberforge/challenge-015-python-powershell\"\nif [ -d \"\
          $WORKDIR/challenges/challenge-015-python-powershell\" ]; then\n  cd \"$WORKDIR/challenges/challenge-015-python-powershell\"\
          \n  if [ -f \"teardown.sh\" ]; then\n    chmod +x teardown.sh\n    ./teardown.sh\n\
          \  else\n    echo '[CF] No teardown script found — stopping any Docker containers\
          \ if present'\n    docker compose down --remove-orphans 2>/dev/null || true\n\
          \  fi\nfi\nrm -rf \"$WORKDIR\"\necho '[CF] Teardown complete: challenge-015-python-powershell'"
    windows:
      psh:
        command: "$ErrorActionPreference = \"SilentlyContinue\"\nWrite-Host \"[CF]\
          \ Tearing down: challenge-015-python-powershell\"\n$WorkDir = \"C:\\\\CyberForge\\\
          \\challenge-015-python-powershell\"\nif (Test-Path \"$WorkDir\\\\\" + \"\
          challenges\\\\challenge-015-python-powershell\") {\n  Set-Location \"$WorkDir\\\
          \\\" + \"challenges\\\\challenge-015-python-powershell\"\n  if (Test-Path\
          \ \".\\\\\" + \"teardown.ps1\") {\n    powershell -ExecutionPolicy Bypass\
          \ -File .\\\\teardown.ps1\n  }\n}\nRemove-Item -Recurse -Force $WorkDir\
          \ -ErrorAction SilentlyContinue\nWrite-Host \"[CF] Teardown complete: challenge-015-python-powershell\""
