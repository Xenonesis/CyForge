- id: cf-deploy-challenge-005-windows-powershell
  name: '[CF] Deploy: PowerShell Execution and Defense Evasion'
  description: 'Pull challenge-005-windows-powershell from GitLab and host it on the
    target machine.

    Domain: Python and Powershell for attack | Difficulty: medium | Stack: none'
  tactic: execution
  technique:
    attack_id: T1059.001
    name: PowerShell
  platforms:
    windows:
      psh:
        command: "$ErrorActionPreference = \"Stop\"\nWrite-Host \"[CF] CyberForge\
          \ challenge deploy starting: challenge-005-windows-powershell\"\n\n# ---\
          \ Authenticate to GitLab ---\n$GitlabToken = if ($env:GITLAB_TOKEN) { $env:GITLAB_TOKEN\
          \ } elseif (\"#{gitlab.token}\" -ne \"#{gitlab.token}\") { \"#{gitlab.token}\"\
          \ } else { \"\" }\n$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else\
          \ { \"https://gitlab.example.com/cyberforge/cyberforge-content.git\" }\n\
          \nif ($GitlabToken) {\n  $RepoAuthUrl = $RepoUrl -replace \"https://\",\
          \ \"https://oauth2:$($GitlabToken)@\"\n} else {\n  $RepoAuthUrl = $RepoUrl\n\
          }\n\n# --- Sparse-checkout only the challenge directory ---\n$WorkDir =\
          \ \"C:\\\\CyberForge\\\\challenge-005-windows-powershell\"\nif (Test-Path\
          \ \"$WorkDir\\.git\") {\n  Write-Host '[CF] Updating existing clone...'\n\
          \  git -C $WorkDir pull --ff-only\n} else {\n  New-Item -ItemType Directory\
          \ -Force -Path $WorkDir | Out-Null\n  git clone --depth 1 --filter=blob:none\
          \ --sparse $RepoAuthUrl $WorkDir\n  git -C $WorkDir sparse-checkout set\
          \ \"challenges/challenge-005-windows-powershell\"\n}\n\n# --- Change into\
          \ challenge directory ---\nSet-Location \"$WorkDir\\\\challenges\\\\challenge-005-windows-powershell\"\
          \n\n# --- Run challenge setup ---\npowershell -ExecutionPolicy Bypass -File\
          \ .\\\\setup.ps1\n\nWrite-Host '[CF] Running health check...'\nif (-not\
          \ (Test-Path C:\\CyberForge\\challenge-005-windows-powershell\\README.txt))\
          \ { Write-Error '[CF] Setup incomplete' }\nWrite-Host '[CF] Health check\
          \ passed.'\n\nWrite-Host \"[CF] Challenge challenge-005-windows-powershell\
          \ deployed successfully.\""
