  description: Deploy machine web01 from killchain-001-web-to-ad.
  tactic: execution
  technique:
    attack_id: T1059.004
    name: Unix Shell
  platforms:
    linux:
      sh:
        command: 'set -e

          REPO_URL="${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}"

          WORKDIR="/tmp/cyberforge-killchain-001-web-to-ad-web01"

          if [ -d "$WORKDIR" ]; then rm -rf "$WORKDIR"; fi

          git clone --depth 1 "$REPO_URL" "$WORKDIR"

          cd "$WORKDIR/killchains/killchain-001-web-to-ad/web01"

          chmod +x web01_setup.sh

          ./web01_setup.sh'
