- id: cf-teardown-challenge-003-auth-bypass
  name: '[CF] Teardown: Broken Authentication Bypass'
  description: Cleanly tear down and remove the hosted environment for challenge-003-auth-bypass.
  tactic: defense-evasion
  technique:
    attack_id: T1070
    name: Indicator Removal
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] Tearing down: challenge-003-auth-bypass'\nWORKDIR=\"\
          /opt/cyberforge/challenge-003-auth-bypass\"\nif [ -d \"$WORKDIR/challenges/challenge-003-auth-bypass\"\
          \ ]; then\n  cd \"$WORKDIR/challenges/challenge-003-auth-bypass\"\n  if\
          \ [ -f \"teardown.sh\" ]; then\n    chmod +x teardown.sh\n    ./teardown.sh\n\
          \  else\n    echo '[CF] No teardown script found — stopping any Docker containers\
          \ if present'\n    docker compose down --remove-orphans 2>/dev/null || true\n\
          \  fi\nfi\nrm -rf \"$WORKDIR\"\necho '[CF] Teardown complete: challenge-003-auth-bypass'"
