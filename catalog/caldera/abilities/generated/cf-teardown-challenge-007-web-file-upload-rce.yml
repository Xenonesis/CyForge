  tactic: defense-evasion
  technique:
    attack_id: T1070
    name: Indicator Removal
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] Tearing down: challenge-007-web-file-upload-rce'\n\
          WORKDIR=\"/opt/cyberforge/challenge-007-web-file-upload-rce\"\nif [ -d \"\
          $WORKDIR/challenges/challenge-007-web-file-upload-rce\" ]; then\n  cd \"\
