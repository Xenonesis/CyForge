- id: cf-deploy-killchain-003-vpn-breach-ransomware
  name: '[CF] Deploy (fleet): VPN Breach to Ransomware Objective'
  description: 'Deploy all machines for killchain killchain-003-vpn-breach-ransomware.

    Run this ability once per machine in the operation — CALDERA will send it to every
    agent.

    Vulnerabilities: VPN brute-force and credential stuffing, Persistence via scheduled
    task, Privilege escalation on file server, Lateral movement using pass-the-hash,
    Ransomware-style impact simulation'
  tactic: impact
  technique:
    attack_id: T1486
    name: Data Encrypted for Impact
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] CyberForge challenge deploy starting: killchain-003-vpn-breach-ransomware'\n\
          \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
          \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
          \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] &&\
          \ [ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"\
          $(echo \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\"\
          )\"\nelse\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only\
          \ the challenge directory ---\nWORKDIR=\"/opt/cyberforge/killchain-003-vpn-breach-ransomware\"\
          \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
          \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n \
          \ git clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"\
          $WORKDIR\"\n  git -C \"$WORKDIR\" sparse-checkout set \"killchains/killchain-003-vpn-breach-ransomware\"\
          \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/killchains/killchain-003-vpn-breach-ransomware\"\
          \n\n# --- Run challenge setup ---\nchmod +x setup.sh\n./setup.sh\n\necho\
          \ '[CF] Challenge killchain-003-vpn-breach-ransomware deployed successfully.'"
    windows:
      psh:
        command: "$ErrorActionPreference = \"Stop\"\nWrite-Host \"[CF] CyberForge\
          \ challenge deploy starting: killchain-003-vpn-breach-ransomware\"\n\n#\
          \ --- Authenticate to GitLab ---\n$GitlabToken = if ($env:GITLAB_TOKEN)\
          \ { $env:GITLAB_TOKEN } elseif (\"#{gitlab.token}\" -ne \"#{gitlab.token}\"\
          ) { \"#{gitlab.token}\" } else { \"\" }\n$RepoUrl = if ($env:REPO_URL) {\
          \ $env:REPO_URL } else { \"https://gitlab.example.com/cyberforge/cyberforge-content.git\"\
          \ }\n\nif ($GitlabToken) {\n  $RepoAuthUrl = $RepoUrl -replace \"https://\"\
          , \"https://oauth2:$($GitlabToken)@\"\n} else {\n  $RepoAuthUrl = $RepoUrl\n\
          }\n\n# --- Sparse-checkout only the challenge directory ---\n$WorkDir =\
          \ \"C:\\\\CyberForge\\\\killchain-003-vpn-breach-ransomware\"\nif (Test-Path\
          \ \"$WorkDir\\.git\") {\n  Write-Host '[CF] Updating existing clone...'\n\
          \  git -C $WorkDir pull --ff-only\n} else {\n  New-Item -ItemType Directory\
          \ -Force -Path $WorkDir | Out-Null\n  git clone --depth 1 --filter=blob:none\
          \ --sparse $RepoAuthUrl $WorkDir\n  git -C $WorkDir sparse-checkout set\
          \ \"killchains/killchain-003-vpn-breach-ransomware\"\n}\n\n# --- Change\
          \ into challenge directory ---\nSet-Location \"$WorkDir\\\\killchains\\\\\
          killchain-003-vpn-breach-ransomware\"\n\n# --- Run challenge setup ---\n\
          powershell -ExecutionPolicy Bypass -File .\\\\setup.ps1\n\nWrite-Host \"\
          [CF] Challenge killchain-003-vpn-breach-ransomware deployed successfully.\""
