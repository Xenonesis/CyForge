- id: cf-deploy-killchain-001-web-to-ad-pivot01
  name: '[CF] Deploy machine: pivot01 (killchain-001-web-to-ad)'
  description: 'Deploy only the pivot01 machine role for killchain killchain-001-web-to-ad.

    Role: Linux pivot host with misconfigured sudoers | OS: linux | Stack: none'
  tactic: execution
  technique:
    attack_id: T1059.004
    name: Unix Shell
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] CyberForge challenge deploy starting: killchain-001-web-to-ad-pivot01'\n\
          \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
          \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
          \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] &&\
          \ [ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"\
          $(echo \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\"\
          )\"\nelse\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only\
          \ the challenge directory ---\nWORKDIR=\"/opt/cyberforge/killchain-001-web-to-ad-pivot01\"\
          \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
          \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n \
          \ git clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"\
          $WORKDIR\"\n  git -C \"$WORKDIR\" sparse-checkout set \"killchains/killchain-001-web-to-ad/pivot01\"\
          \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/killchains/killchain-001-web-to-ad/pivot01\"\
          \n\n# --- Run challenge setup ---\nchmod +x pivot01_setup.sh\n./pivot01_setup.sh\n\
          \necho '[CF] Challenge killchain-001-web-to-ad-pivot01 deployed successfully.'"
