- id: cf-challenge-001-sqli
  name: CyberForge Deploy SQL Injection Fundamentals
  description: Deploy challenge-001-sqli from GitLab content.
  tactic: execution
  technique:
    attack_id: T1190
    name: Exploit Public-Facing Application
  platforms:
    linux:
      sh:
        command: 'set -e

          REPO_URL="${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}"

          WORKDIR="/tmp/cyberforge-challenge-001-sqli"

          if [ -d "$WORKDIR" ]; then rm -rf "$WORKDIR"; fi

          git clone --depth 1 "$REPO_URL" "$WORKDIR"

          cd "$WORKDIR/challenges/challenge-001-sqli"

          chmod +x setup.sh

          ./setup.sh'
