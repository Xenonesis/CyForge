- id: cf-teardown-challenge-006-web-lfi
  name: '[CF] Teardown: Local File Inclusion Exploitation'
  description: Cleanly tear down and remove the hosted environment for challenge-006-web-lfi.
  tactic: defense-evasion
  technique:
    attack_id: T1070
    name: Indicator Removal
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] Tearing down: challenge-006-web-lfi'\nWORKDIR=\"\
          /opt/cyberforge/challenge-006-web-lfi\"\nif [ -d \"$WORKDIR/challenges/challenge-006-web-lfi\"\
          \ ]; then\n  cd \"$WORKDIR/challenges/challenge-006-web-lfi\"\n  if [ -f\
          \ \"teardown.sh\" ]; then\n    chmod +x teardown.sh\n    ./teardown.sh\n\
          \  else\n    echo '[CF] No teardown script found — stopping any Docker containers\
          \ if present'\n    docker compose down --remove-orphans 2>/dev/null || true\n\
          \  fi\nfi\nrm -rf \"$WORKDIR\"\necho '[CF] Teardown complete: challenge-006-web-lfi'"
