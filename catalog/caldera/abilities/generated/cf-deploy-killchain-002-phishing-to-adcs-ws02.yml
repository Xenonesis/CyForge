- id: cf-deploy-killchain-002-phishing-to-adcs-ws02
  name: '[CF] Deploy machine: ws02 (killchain-002-phishing-to-adcs)'
  description: 'Deploy only the ws02 machine role for killchain killchain-002-phishing-to-adcs.

    Role: Victim workstation with macro execution | OS: windows | Stack: none'
  tactic: execution
  technique:
    attack_id: T1059.001
    name: PowerShell
  platforms:
    windows:
      psh:
        command: "$ErrorActionPreference = \"Stop\"\nWrite-Host \"[CF] CyberForge\
          \ challenge deploy starting: killchain-002-phishing-to-adcs-ws02\"\n\n#\
          \ --- Authenticate to GitLab ---\n$GitlabToken = if ($env:GITLAB_TOKEN)\
          \ { $env:GITLAB_TOKEN } elseif (\"#{gitlab.token}\" -ne \"#{gitlab.token}\"\
          ) { \"#{gitlab.token}\" } else { \"\" }\n$RepoUrl = if ($env:REPO_URL) {\
