- id: cf-challenge-005-windows-powershell
  name: CyberForge Deploy PowerShell Execution and Defense Evasion
  description: Deploy challenge-005-windows-powershell from GitLab content.
  tactic: execution
  technique:
    attack_id: T1059.001
    name: PowerShell
  platforms:
    windows:
      psh:
        command: '$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else { "https://gitlab.example.com/cyberforge/cyberforge-content.git"
          }

          $WorkDir = "C:\\Temp\\cyberforge-challenge-005-windows-powershell"

          if (Test-Path $WorkDir) { Remove-Item -Recurse -Force $WorkDir }

          git clone --depth 1 $RepoUrl $WorkDir

          Set-Location "$WorkDir\\challenges\\challenge-005-windows-powershell"

          powershell -ExecutionPolicy Bypass -File .\\setup.ps1'
