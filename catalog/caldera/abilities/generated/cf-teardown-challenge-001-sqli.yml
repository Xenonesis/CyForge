- id: cf-teardown-challenge-001-sqli
  name: '[CF] Teardown: SQL Injection Fundamentals'
  description: Cleanly tear down and remove the hosted environment for challenge-001-sqli.
  tactic: defense-evasion
  technique:
    attack_id: T1070
    name: Indicator Removal
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] Tearing down: challenge-001-sqli'\nWORKDIR=\"\
          /opt/cyberforge/challenge-001-sqli\"\nif [ -d \"$WORKDIR/challenges/challenge-001-sqli\"\
          \ ]; then\n  cd \"$WORKDIR/challenges/challenge-001-sqli\"\n  if [ -f \"\
          teardown.sh\" ]; then\n    chmod +x teardown.sh\n    ./teardown.sh\n  else\n\
          \    echo '[CF] No teardown script found — stopping any Docker containers\
          \ if present'\n    docker compose down --remove-orphans 2>/dev/null || true\n\
          \  fi\nfi\nrm -rf \"$WORKDIR\"\necho '[CF] Teardown complete: challenge-001-sqli'"
