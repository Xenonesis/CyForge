      sh:
        command: "set -e\necho '[CF] Tearing down: challenge-012-network-arp-mitm'\n\
          WORKDIR=\"/opt/cyberforge/challenge-012-network-arp-mitm\"\nif [ -d \"$WORKDIR/challenges/challenge-012-network-arp-mitm\"\
          \ ]; then\n  cd \"$WORKDIR/challenges/challenge-012-network-arp-mitm\"\n\
