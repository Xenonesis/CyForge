- id: cf-teardown-killchain-003-vpn-breach-ransomware
  name: '[CF] Teardown (fleet): VPN Breach to Ransomware Objective'
  description: Cleanly tear down and remove the hosted environment for killchain-003-vpn-breach-ransomware.
  tactic: defense-evasion
  technique:
    attack_id: T1070
    name: Indicator Removal
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] Tearing down: killchain-003-vpn-breach-ransomware'\n\
          WORKDIR=\"/opt/cyberforge/killchain-003-vpn-breach-ransomware\"\nif [ -d\
          \ \"$WORKDIR/killchains/killchain-003-vpn-breach-ransomware\" ]; then\n\
          \  cd \"$WORKDIR/killchains/killchain-003-vpn-breach-ransomware\"\n  if\
          \ [ -f \"teardown.sh\" ]; then\n    chmod +x teardown.sh\n    ./teardown.sh\n\
          \  else\n    echo '[CF] No teardown script found — stopping any Docker containers\
          \ if present'\n    docker compose down --remove-orphans 2>/dev/null || true\n\
          \  fi\nfi\nrm -rf \"$WORKDIR\"\necho '[CF] Teardown complete: killchain-003-vpn-breach-ransomware'"
    windows:
      psh:
        command: "$ErrorActionPreference = \"SilentlyContinue\"\nWrite-Host \"[CF]\
          \ Tearing down: killchain-003-vpn-breach-ransomware\"\n$WorkDir = \"C:\\\
          \\CyberForge\\\\killchain-003-vpn-breach-ransomware\"\nif (Test-Path \"\
          $WorkDir\\\\\" + \"killchains\\\\killchain-003-vpn-breach-ransomware\")\
          \ {\n  Set-Location \"$WorkDir\\\\\" + \"killchains\\\\killchain-003-vpn-breach-ransomware\"\
          \n  if (Test-Path \".\\\\\" + \"teardown.ps1\") {\n    powershell -ExecutionPolicy\
          \ Bypass -File .\\\\teardown.ps1\n  }\n}\nRemove-Item -Recurse -Force $WorkDir\
          \ -ErrorAction SilentlyContinue\nWrite-Host \"[CF] Teardown complete: killchain-003-vpn-breach-ransomware\""
