- id: cf-deploy-killchain-002-phishing-to-adcs-app02
  name: '[CF] Deploy machine: app02 (killchain-002-phishing-to-adcs)'
  description: 'Deploy only the app02 machine role for killchain killchain-002-phishing-to-adcs.

    Role: App server with kernel misconfig | OS: linux | Stack: none'
  tactic: execution
  technique:
    attack_id: T1059.004
    name: Unix Shell
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] CyberForge challenge deploy starting: killchain-002-phishing-to-adcs-app02'\n\
          \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
          \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
          \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] &&\
          \ [ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"\
          $(echo \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\"\
          )\"\nelse\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only\
          \ the challenge directory ---\nWORKDIR=\"/opt/cyberforge/killchain-002-phishing-to-adcs-app02\"\
          \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
          \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n \
          \ git clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"\
          $WORKDIR\"\n  git -C \"$WORKDIR\" sparse-checkout set \"killchains/killchain-002-phishing-to-adcs/app02\"\
          \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/killchains/killchain-002-phishing-to-adcs/app02\"\
          \n\n# --- Run challenge setup ---\nchmod +x app02_setup.sh\n./app02_setup.sh\n\
          \necho '[CF] Challenge killchain-002-phishing-to-adcs-app02 deployed successfully.'"
