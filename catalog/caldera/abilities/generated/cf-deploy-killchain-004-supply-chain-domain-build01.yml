- id: cf-deploy-killchain-004-supply-chain-domain-build01
  name: '[CF] Deploy machine: build01 (killchain-004-supply-chain-domain)'
  description: 'Deploy only the build01 machine role for killchain killchain-004-supply-chain-domain.

    Role: CI build server with poisoned dependency | OS: linux | Stack: docker'
  tactic: execution
  technique:
    attack_id: T1059.004
    name: Unix Shell
  platforms:
    linux:
      sh:
        command: "set -e\necho '[CF] CyberForge challenge deploy starting: killchain-004-supply-chain-domain-build01'\n\
          \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
          \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
          \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] &&\
          \ [ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"\
          $(echo \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\"\
          )\"\nelse\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only\
          \ the challenge directory ---\nWORKDIR=\"/opt/cyberforge/killchain-004-supply-chain-domain-build01\"\
          \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
          \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n \
          \ git clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"\
          $WORKDIR\"\n  git -C \"$WORKDIR\" sparse-checkout set \"killchains/killchain-004-supply-chain-domain/build01\"\
          \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/killchains/killchain-004-supply-chain-domain/build01\"\
          \n\n# --- Install dependencies ---\nif ! command -v docker >/dev/null 2>&1;\
          \ then\n  echo '[CF] Installing Docker...'\n  curl -fsSL https://get.docker.com\
          \ | sh\n  systemctl enable --now docker\nfi\nif ! command -v docker compose\
          \ >/dev/null 2>&1; then\n  apt-get install -y docker-compose-plugin 2>/dev/null\
          \ || true\nfi\n\n# --- Run challenge setup ---\nchmod +x build01_setup.sh\n\
          ./build01_setup.sh\n\necho '[CF] Running health check...'\ndocker ps | grep\
          \ build_runner || echo 'Build runner check'\necho '[CF] Health check passed.'\n\
          \necho '[CF] Challenge killchain-004-supply-chain-domain-build01 deployed\
          \ successfully.'"
