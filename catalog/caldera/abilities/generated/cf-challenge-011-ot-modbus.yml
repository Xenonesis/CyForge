- id: cf-challenge-011-ot-modbus
  name: CyberForge Deploy ICS Modbus Unauthorized Write
  description: Deploy challenge-011-ot-modbus from GitLab content.
  tactic: impact
  technique:
    attack_id: T0831
    name: Manipulation of Control
  platforms:
    linux:
      sh:
        command: 'set -e

          REPO_URL="${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}"

          WORKDIR="/tmp/cyberforge-challenge-011-ot-modbus"

          if [ -d "$WORKDIR" ]; then rm -rf "$WORKDIR"; fi

          git clone --depth 1 "$REPO_URL" "$WORKDIR"

          cd "$WORKDIR/challenges/challenge-011-ot-modbus"

          chmod +x setup.sh

          ./setup.sh'
