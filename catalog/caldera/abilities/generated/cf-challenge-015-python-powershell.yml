- id: cf-challenge-015-python-powershell
  name: CyberForge Deploy Python and PowerShell Multi-Stage
  description: Deploy challenge-015-python-powershell from GitLab content.
  tactic: execution
  technique:
    attack_id: T1059
    name: Command and Scripting Interpreter
  platforms:
    linux:
      sh:
        command: 'set -e

          REPO_URL="${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}"

          WORKDIR="/tmp/cyberforge-challenge-015-python-powershell"

          if [ -d "$WORKDIR" ]; then rm -rf "$WORKDIR"; fi

          git clone --depth 1 "$REPO_URL" "$WORKDIR"

          cd "$WORKDIR/challenges/challenge-015-python-powershell"

          chmod +x setup.sh

          ./setup.sh'
    windows:
      psh:
        command: '$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else { "https://gitlab.example.com/cyberforge/cyberforge-content.git"
          }

          $WorkDir = "C:\\Temp\\cyberforge-challenge-015-python-powershell"

          if (Test-Path $WorkDir) { Remove-Item -Recurse -Force $WorkDir }

          git clone --depth 1 $RepoUrl $WorkDir

          Set-Location "$WorkDir\\challenges\\challenge-015-python-powershell"

          powershell -ExecutionPolicy Bypass -File .\\setup.ps1'
