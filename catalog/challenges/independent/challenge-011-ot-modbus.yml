id: challenge-011-ot-modbus
name: ICS Modbus Unauthorized Write
description: Manipulate Modbus registers in an OT simulation environment.
domain: OT/ ICS Systems
content_type: independent
difficulty: hard
stack: scada
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: challenges/challenge-011-ot-modbus
tactic: impact
technique:
  attack_id: T0831
  name: Manipulation of Control
platforms:
  linux:
    sh:
      command: "set -e\necho '[CF] CyberForge challenge deploy starting: challenge-011-ot-modbus'\n\
        \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
        \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
        \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] && [\
        \ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"$(echo\
        \ \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\")\"\n\
        else\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\nWORKDIR=\"/opt/cyberforge/challenge-011-ot-modbus\"\
        \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
        \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n  git\
        \ clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"$WORKDIR\"\
        \n  git -C \"$WORKDIR\" sparse-checkout set \"challenges/challenge-011-ot-modbus\"\
        \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/challenges/challenge-011-ot-modbus\"\
        \n\n# --- Install dependencies ---\nif ! command -v python3 >/dev/null 2>&1;\
        \ then\n  apt-get update -q && apt-get install -y python3 python3-pip\nfi\n\
        pip3 install pymodbus 2>/dev/null || true\n\n# --- Run challenge setup ---\n\
        chmod +x setup.sh\n./setup.sh\n\necho '[CF] Running health check...'\npython3\
        \ -c \"from pymodbus.client import ModbusTcpClient; c=ModbusTcpClient('localhost',port=502);\
        \ print('Modbus OK' if c.connect() else 'Modbus FAIL')\"\necho '[CF] Health\
        \ check passed.'\n\necho '[CF] Challenge challenge-011-ot-modbus deployed\
        \ successfully.'"
