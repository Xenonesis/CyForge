id: challenge-012-network-arp-mitm
name: ARP Spoofing MITM
description: Launch ARP spoofing and traffic interception against isolated targets.
domain: Network Attacks
content_type: independent
difficulty: medium
stack: network
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: challenges/challenge-012-network-arp-mitm
tactic: credential-access
technique:
  attack_id: T1557.002
  name: ARP Cache Poisoning
platforms:
  linux:
    sh:
      command: "set -e\necho '[CF] CyberForge challenge deploy starting: challenge-012-network-arp-mitm'\n\
        \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
        \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
        \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] && [\
        \ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"$(echo\
        \ \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\")\"\n\
        else\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\nWORKDIR=\"/opt/cyberforge/challenge-012-network-arp-mitm\"\
        \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
        \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n  git\
        \ clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"$WORKDIR\"\
        \n  git -C \"$WORKDIR\" sparse-checkout set \"challenges/challenge-012-network-arp-mitm\"\
        \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/challenges/challenge-012-network-arp-mitm\"\
        \n\n# --- Install dependencies ---\napt-get update -q && apt-get install -y\
        \ arp-scan dsniff net-tools 2>/dev/null || true\n\n# --- Run challenge setup\
        \ ---\nchmod +x setup.sh\n./setup.sh\n\necho '[CF] Running health check...'\n\
        arp-scan --localnet --quiet | head -5 && echo '[CF] Network scan OK'\necho\
        \ '[CF] Health check passed.'\n\necho '[CF] Challenge challenge-012-network-arp-mitm\
        \ deployed successfully.'"
