id: challenge-014-waf-bypass
name: WAF Bypass Payload Evasion
description: Bypass signature-based WAF controls with obfuscated request payloads.
domain: WAF Bypass Attacks
content_type: independent
difficulty: hard
stack: docker
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: challenges/challenge-014-waf-bypass
tactic: defense-evasion
technique:
  attack_id: T1562
  name: Impair Defenses
platforms:
  linux:
    sh:
      command: "set -e\necho '[CF] CyberForge challenge deploy starting: challenge-014-waf-bypass'\n\
        \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
        \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
        \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] && [\
        \ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"$(echo\
        \ \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\")\"\n\
        else\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\nWORKDIR=\"/opt/cyberforge/challenge-014-waf-bypass\"\
        \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
        \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n  git\
        \ clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"$WORKDIR\"\
        \n  git -C \"$WORKDIR\" sparse-checkout set \"challenges/challenge-014-waf-bypass\"\
        \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/challenges/challenge-014-waf-bypass\"\
        \n\n# --- Install dependencies ---\nif ! command -v docker >/dev/null 2>&1;\
        \ then\n  echo '[CF] Installing Docker...'\n  curl -fsSL https://get.docker.com\
        \ | sh\n  systemctl enable --now docker\nfi\nif ! command -v docker compose\
        \ >/dev/null 2>&1; then\n  apt-get install -y docker-compose-plugin 2>/dev/null\
        \ || true\nfi\n\n# --- Run challenge setup ---\nchmod +x setup.sh\n./setup.sh\n\
        \necho '[CF] Running health check...'\ncurl -sf http://localhost:8080/health\
        \ && curl -sf http://localhost:8888/health || echo '[CF] WAF proxy may still\
        \ be starting'\necho '[CF] Health check passed.'\n\necho '[CF] Challenge challenge-014-waf-bypass\
        \ deployed successfully.'"
