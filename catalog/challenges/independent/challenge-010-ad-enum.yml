id: challenge-010-ad-enum
name: Active Directory Enumeration
description: Enumerate trust paths and privileged relationships in Active Directory.
domain: AD Attacks
content_type: independent
difficulty: medium
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: challenges/challenge-010-ad-enum
tactic: discovery
technique:
  attack_id: T1087.002
  name: Domain Account
platforms:
  windows:
    psh:
      command: '$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else { "https://gitlab.example.com/cyberforge/cyberforge-content.git"
        }

        $WorkDir = "C:\\Temp\\cyberforge-challenge-010-ad-enum"

        if (Test-Path $WorkDir) { Remove-Item -Recurse -Force $WorkDir }

        git clone --depth 1 $RepoUrl $WorkDir

        Set-Location "$WorkDir\\challenges\\challenge-010-ad-enum"

        powershell -ExecutionPolicy Bypass -File .\\setup.ps1'
