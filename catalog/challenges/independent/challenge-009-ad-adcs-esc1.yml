id: challenge-009-ad-adcs-esc1
name: Active Directory ADCS ESC1
description: Exploit ADCS ESC1 template misconfiguration for privilege escalation.
domain: AD Attacks
content_type: independent
difficulty: hard
stack: ad
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: challenges/challenge-009-ad-adcs-esc1
tactic: privilege-escalation
technique:
  attack_id: T1649
  name: Steal or Forge Authentication Certificates
platforms:
  windows:
    psh:
      command: "$ErrorActionPreference = \"Stop\"\nWrite-Host \"[CF] CyberForge challenge\
        \ deploy starting: challenge-009-ad-adcs-esc1\"\n\n# --- Authenticate to GitLab\
        \ ---\n$GitlabToken = if ($env:GITLAB_TOKEN) { $env:GITLAB_TOKEN } elseif\
        \ (\"#{gitlab.token}\" -ne \"#{gitlab.token}\") { \"#{gitlab.token}\" } else\
        \ { \"\" }\n$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else { \"https://gitlab.example.com/cyberforge/cyberforge-content.git\"\
        \ }\n\nif ($GitlabToken) {\n  $RepoAuthUrl = $RepoUrl -replace \"https://\"\
        , \"https://oauth2:$($GitlabToken)@\"\n} else {\n  $RepoAuthUrl = $RepoUrl\n\
        }\n\n# --- Sparse-checkout only the challenge directory ---\n$WorkDir = \"\
        C:\\\\CyberForge\\\\challenge-009-ad-adcs-esc1\"\nif (Test-Path \"$WorkDir\\\
        .git\") {\n  Write-Host '[CF] Updating existing clone...'\n  git -C $WorkDir\
        \ pull --ff-only\n} else {\n  New-Item -ItemType Directory -Force -Path $WorkDir\
        \ | Out-Null\n  git clone --depth 1 --filter=blob:none --sparse $RepoAuthUrl\
        \ $WorkDir\n  git -C $WorkDir sparse-checkout set \"challenges/challenge-009-ad-adcs-esc1\"\
        \n}\n\n# --- Change into challenge directory ---\nSet-Location \"$WorkDir\\\
        \\challenges\\\\challenge-009-ad-adcs-esc1\"\n\n# --- Install dependencies\
        \ ---\nif (-not (Get-Module -ListAvailable -Name ActiveDirectory)) {\n  Add-WindowsFeature\
        \ -Name RSAT-AD-PowerShell -IncludeAllSubFeature 2>$null\n}\n\n# --- Run challenge\
        \ setup ---\npowershell -ExecutionPolicy Bypass -File .\\\\setup.ps1\n\nWrite-Host\
        \ '[CF] Running health check...'\nGet-CATemplate | Measure-Object | Select-Object\
        \ -ExpandProperty Count\nWrite-Host '[CF] Health check passed.'\n\nWrite-Host\
        \ \"[CF] Challenge challenge-009-ad-adcs-esc1 deployed successfully.\""
