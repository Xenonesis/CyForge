id: challenge-003-auth-bypass
name: Broken Authentication Bypass
description: Authentication and session bypass via weak token validation logic.
domain: OWASP Top 10 Attacks
content_type: independent
difficulty: easy
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: challenges/challenge-003-auth-bypass
tactic: credential-access
technique:
  attack_id: T1078
  name: Valid Accounts
platforms:
  linux:
    sh:
      command: 'set -e

        REPO_URL="${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}"

        WORKDIR="/tmp/cyberforge-challenge-003-auth-bypass"

        if [ -d "$WORKDIR" ]; then rm -rf "$WORKDIR"; fi

        git clone --depth 1 "$REPO_URL" "$WORKDIR"

        cd "$WORKDIR/challenges/challenge-003-auth-bypass"

        chmod +x setup.sh

        ./setup.sh'
