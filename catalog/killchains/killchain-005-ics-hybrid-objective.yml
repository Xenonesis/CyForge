id: killchain-005-ics-hybrid-objective
name: Hybrid IT/OT Intrusion to Objective
description: Crossing enterprise and OT segments with Linux and AD pivoting.
content_type: killchain
domain: Complete Cyber Kill Chain Scenario (Recon to Action on Objective)
difficulty: hard
tactic: impact
technique:
  attack_id: T0831
  name: Manipulation of Control
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: killchains/killchain-005-ics-hybrid-objective
vulnerabilities:
- Public-facing service exploitation
- Credential abuse on jump host
- Pivot into OT segment
- AD trust abuse for persistence
- Action on objective in ICS simulation
machines:
- machine_id: web04
  os: linux
  setup_script: web04_setup.sh
  stack: docker
  role: Internet-facing web server
  health_check: curl -sf http://localhost:8080/health || exit 1
- machine_id: jump01
  os: windows
  setup_script: jump01_setup.ps1
  stack: none
  role: Jump host bridging IT and OT segments
  health_check: ''
- machine_id: scada01
  os: linux
  setup_script: scada01_setup.sh
  stack: scada
  role: SCADA/Modbus simulation server
  health_check: python3 -c "from pymodbus.client import ModbusTcpClient; c=ModbusTcpClient('localhost',port=502);
    print('Modbus OK' if c.connect() else 'FAIL')"
- machine_id: dc04
  os: windows
  setup_script: dc04_setup.ps1
  stack: ad
  role: DC for AD trust abuse
  health_check: (Get-ADDomain).DNSRoot
platforms:
  linux:
    sh:
      command: "set -e\necho '[CF] CyberForge challenge deploy starting: killchain-005-ics-hybrid-objective'\n\
        \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
        \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
        \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] && [\
        \ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"$(echo\
        \ \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\")\"\n\
        else\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\nWORKDIR=\"/opt/cyberforge/killchain-005-ics-hybrid-objective\"\
        \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
        \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n  git\
        \ clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"$WORKDIR\"\
        \n  git -C \"$WORKDIR\" sparse-checkout set \"killchains/killchain-005-ics-hybrid-objective\"\
        \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/killchains/killchain-005-ics-hybrid-objective\"\
        \n\n# --- Run challenge setup ---\nchmod +x setup.sh\n./setup.sh\n\necho '[CF]\
        \ Challenge killchain-005-ics-hybrid-objective deployed successfully.'"
  windows:
    psh:
      command: "$ErrorActionPreference = \"Stop\"\nWrite-Host \"[CF] CyberForge challenge\
        \ deploy starting: killchain-005-ics-hybrid-objective\"\n\n# --- Authenticate\
        \ to GitLab ---\n$GitlabToken = if ($env:GITLAB_TOKEN) { $env:GITLAB_TOKEN\
        \ } elseif (\"#{gitlab.token}\" -ne \"#{gitlab.token}\") { \"#{gitlab.token}\"\
        \ } else { \"\" }\n$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else {\
        \ \"https://gitlab.example.com/cyberforge/cyberforge-content.git\" }\n\nif\
        \ ($GitlabToken) {\n  $RepoAuthUrl = $RepoUrl -replace \"https://\", \"https://oauth2:$($GitlabToken)@\"\
        \n} else {\n  $RepoAuthUrl = $RepoUrl\n}\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\n$WorkDir = \"C:\\\\CyberForge\\\\killchain-005-ics-hybrid-objective\"\
        \nif (Test-Path \"$WorkDir\\.git\") {\n  Write-Host '[CF] Updating existing\
        \ clone...'\n  git -C $WorkDir pull --ff-only\n} else {\n  New-Item -ItemType\
        \ Directory -Force -Path $WorkDir | Out-Null\n  git clone --depth 1 --filter=blob:none\
        \ --sparse $RepoAuthUrl $WorkDir\n  git -C $WorkDir sparse-checkout set \"\
        killchains/killchain-005-ics-hybrid-objective\"\n}\n\n# --- Change into challenge\
        \ directory ---\nSet-Location \"$WorkDir\\\\killchains\\\\killchain-005-ics-hybrid-objective\"\
        \n\n# --- Run challenge setup ---\npowershell -ExecutionPolicy Bypass -File\
        \ .\\\\setup.ps1\n\nWrite-Host \"[CF] Challenge killchain-005-ics-hybrid-objective\
        \ deployed successfully.\""
