id: killchain-005-ics-hybrid-objective
name: Hybrid IT/OT Intrusion to Objective
description: Crossing enterprise and OT segments with Linux and AD pivoting.
content_type: killchain
domain: Complete Cyber Kill Chain Scenario (Recon to Action on Objective)
difficulty: hard
tactic: impact
technique:
  attack_id: T0831
  name: Manipulation of Control
platforms:
  linux:
    sh:
      command: 'set -e

        REPO_URL="${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}"

        WORKDIR="/tmp/cyberforge-killchain-005-ics-hybrid-objective"

        if [ -d "$WORKDIR" ]; then rm -rf "$WORKDIR"; fi

        git clone --depth 1 "$REPO_URL" "$WORKDIR"

        cd "$WORKDIR/killchains/killchain-005-ics-hybrid-objective"

        chmod +x setup.sh

        ./setup.sh'
  windows:
    psh:
      command: '$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else { "https://gitlab.example.com/cyberforge/cyberforge-content.git"
        }

        $WorkDir = "C:\\Temp\\cyberforge-killchain-005-ics-hybrid-objective"

        if (Test-Path $WorkDir) { Remove-Item -Recurse -Force $WorkDir }

        git clone --depth 1 $RepoUrl $WorkDir

        Set-Location "$WorkDir\\killchains\\killchain-005-ics-hybrid-objective"

        powershell -ExecutionPolicy Bypass -File .\\setup.ps1'
machines:
- machine_id: web04
  os: linux
  setup_script: web04_setup.sh
- machine_id: jump01
  os: windows
  setup_script: jump01_setup.ps1
- machine_id: scada01
  os: linux
  setup_script: scada01_setup.sh
- machine_id: dc04
  os: windows
  setup_script: dc04_setup.ps1
vulnerabilities:
- Public-facing service exploitation
- Credential abuse on jump host
- Pivot into OT segment
- AD trust abuse for persistence
- Action on objective in ICS simulation
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: killchains/killchain-005-ics-hybrid-objective
