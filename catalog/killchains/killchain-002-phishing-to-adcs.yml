id: killchain-002-phishing-to-adcs
name: Phishing, Lateral Movement, ADCS Abuse
description: Email lure to workstation compromise to certificate abuse.
content_type: killchain
domain: Complete Cyber Kill Chain Scenario (Recon to Action on Objective)
difficulty: hard
tactic: execution
technique:
  attack_id: T1059.001
  name: PowerShell
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: killchains/killchain-002-phishing-to-adcs
vulnerabilities:
- Phishing macro execution
- Token theft via in-memory injection
- Linux foothold escalation with kernel misconfig
- AD Enumeration and trust discovery
- ADCS template abuse for privilege escalation
machines:
- machine_id: mail01
  os: linux
  setup_script: mail01_setup.sh
  stack: docker
  role: Mail server running phishing simulation
  health_check: curl -sf http://localhost:25 || true
- machine_id: ws02
  os: windows
  setup_script: ws02_setup.ps1
  stack: none
  role: Victim workstation with macro execution
  health_check: ''
- machine_id: app02
  os: linux
  setup_script: app02_setup.sh
  stack: none
  role: App server with kernel misconfig
  health_check: ''
- machine_id: dc02
  os: windows
  setup_script: dc02_setup.ps1
  stack: ad
  role: DC with ADCS template misconfiguration
  health_check: Get-CATemplate | Measure-Object | Select-Object -ExpandProperty Count
platforms:
  linux:
    sh:
      command: "set -e\necho '[CF] CyberForge challenge deploy starting: killchain-002-phishing-to-adcs'\n\
        \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
        \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
        \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] && [\
        \ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"$(echo\
        \ \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\")\"\n\
        else\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\nWORKDIR=\"/opt/cyberforge/killchain-002-phishing-to-adcs\"\
        \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
        \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n  git\
        \ clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"$WORKDIR\"\
        \n  git -C \"$WORKDIR\" sparse-checkout set \"killchains/killchain-002-phishing-to-adcs\"\
        \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/killchains/killchain-002-phishing-to-adcs\"\
        \n\n# --- Run challenge setup ---\nchmod +x setup.sh\n./setup.sh\n\necho '[CF]\
        \ Challenge killchain-002-phishing-to-adcs deployed successfully.'"
  windows:
    psh:
      command: "$ErrorActionPreference = \"Stop\"\nWrite-Host \"[CF] CyberForge challenge\
        \ deploy starting: killchain-002-phishing-to-adcs\"\n\n# --- Authenticate\
        \ to GitLab ---\n$GitlabToken = if ($env:GITLAB_TOKEN) { $env:GITLAB_TOKEN\
        \ } elseif (\"#{gitlab.token}\" -ne \"#{gitlab.token}\") { \"#{gitlab.token}\"\
        \ } else { \"\" }\n$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else {\
        \ \"https://gitlab.example.com/cyberforge/cyberforge-content.git\" }\n\nif\
        \ ($GitlabToken) {\n  $RepoAuthUrl = $RepoUrl -replace \"https://\", \"https://oauth2:$($GitlabToken)@\"\
        \n} else {\n  $RepoAuthUrl = $RepoUrl\n}\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\n$WorkDir = \"C:\\\\CyberForge\\\\killchain-002-phishing-to-adcs\"\
        \nif (Test-Path \"$WorkDir\\.git\") {\n  Write-Host '[CF] Updating existing\
        \ clone...'\n  git -C $WorkDir pull --ff-only\n} else {\n  New-Item -ItemType\
        \ Directory -Force -Path $WorkDir | Out-Null\n  git clone --depth 1 --filter=blob:none\
        \ --sparse $RepoAuthUrl $WorkDir\n  git -C $WorkDir sparse-checkout set \"\
        killchains/killchain-002-phishing-to-adcs\"\n}\n\n# --- Change into challenge\
        \ directory ---\nSet-Location \"$WorkDir\\\\killchains\\\\killchain-002-phishing-to-adcs\"\
        \n\n# --- Run challenge setup ---\npowershell -ExecutionPolicy Bypass -File\
        \ .\\\\setup.ps1\n\nWrite-Host \"[CF] Challenge killchain-002-phishing-to-adcs\
        \ deployed successfully.\""
