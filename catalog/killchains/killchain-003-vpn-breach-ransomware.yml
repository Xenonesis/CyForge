        cd "$WORKDIR/killchains/killchain-003-vpn-breach-ransomware"

        chmod +x setup.sh

        ./setup.sh'
  windows:
    psh:
      command: '$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else { "https://gitlab.example.com/cyberforge/cyberforge-content.git"
        }

        $WorkDir = "C:\\Temp\\cyberforge-killchain-003-vpn-breach-ransomware"

        if (Test-Path $WorkDir) { Remove-Item -Recurse -Force $WorkDir }

        git clone --depth 1 $RepoUrl $WorkDir

        Set-Location "$WorkDir\\killchains\\killchain-003-vpn-breach-ransomware"

        powershell -ExecutionPolicy Bypass -File .\\setup.ps1'
