id: killchain-004-supply-chain-domain
name: Supply Chain Compromise to Domain Control
description: Trojanized package delivery leading to cross-platform compromise.
content_type: killchain
domain: Complete Cyber Kill Chain Scenario (Recon to Action on Objective)
difficulty: hard
tactic: execution
technique:
  attack_id: T1195
  name: Supply Chain Compromise
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: killchains/killchain-004-supply-chain-domain
vulnerabilities:
- Compromised CI dependency ingestion
- Code execution via malicious build artifact
- Credential theft from deployment host
- Linux to Windows lateral movement
- Domain admin escalation through AD ACL abuse
machines:
- machine_id: build01
  os: linux
  setup_script: build01_setup.sh
  stack: docker
  role: CI build server with poisoned dependency
  health_check: docker ps | grep build_runner || echo 'Build runner check'
- machine_id: deploy01
  os: windows
  setup_script: deploy01_setup.ps1
  stack: none
  role: Windows deploy host
  health_check: ''
- machine_id: app03
  os: linux
  setup_script: app03_setup.sh
  stack: none
  role: Compromised application server
  health_check: ''
- machine_id: dc03
  os: windows
  setup_script: dc03_setup.ps1
  stack: ad
  role: DC with ACL misconfiguration
  health_check: (Get-ADDomain).DNSRoot
platforms:
  linux:
    sh:
      command: "set -e\necho '[CF] CyberForge challenge deploy starting: killchain-004-supply-chain-domain'\n\
        \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
        \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
        \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] && [\
        \ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"$(echo\
        \ \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\")\"\n\
        else\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\nWORKDIR=\"/opt/cyberforge/killchain-004-supply-chain-domain\"\
        \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
        \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n  git\
        \ clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"$WORKDIR\"\
        \n  git -C \"$WORKDIR\" sparse-checkout set \"killchains/killchain-004-supply-chain-domain\"\
        \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/killchains/killchain-004-supply-chain-domain\"\
        \n\n# --- Run challenge setup ---\nchmod +x setup.sh\n./setup.sh\n\necho '[CF]\
        \ Challenge killchain-004-supply-chain-domain deployed successfully.'"
  windows:
    psh:
      command: "$ErrorActionPreference = \"Stop\"\nWrite-Host \"[CF] CyberForge challenge\
        \ deploy starting: killchain-004-supply-chain-domain\"\n\n# --- Authenticate\
        \ to GitLab ---\n$GitlabToken = if ($env:GITLAB_TOKEN) { $env:GITLAB_TOKEN\
        \ } elseif (\"#{gitlab.token}\" -ne \"#{gitlab.token}\") { \"#{gitlab.token}\"\
        \ } else { \"\" }\n$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else {\
        \ \"https://gitlab.example.com/cyberforge/cyberforge-content.git\" }\n\nif\
        \ ($GitlabToken) {\n  $RepoAuthUrl = $RepoUrl -replace \"https://\", \"https://oauth2:$($GitlabToken)@\"\
        \n} else {\n  $RepoAuthUrl = $RepoUrl\n}\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\n$WorkDir = \"C:\\\\CyberForge\\\\killchain-004-supply-chain-domain\"\
        \nif (Test-Path \"$WorkDir\\.git\") {\n  Write-Host '[CF] Updating existing\
        \ clone...'\n  git -C $WorkDir pull --ff-only\n} else {\n  New-Item -ItemType\
        \ Directory -Force -Path $WorkDir | Out-Null\n  git clone --depth 1 --filter=blob:none\
        \ --sparse $RepoAuthUrl $WorkDir\n  git -C $WorkDir sparse-checkout set \"\
        killchains/killchain-004-supply-chain-domain\"\n}\n\n# --- Change into challenge\
        \ directory ---\nSet-Location \"$WorkDir\\\\killchains\\\\killchain-004-supply-chain-domain\"\
        \n\n# --- Run challenge setup ---\npowershell -ExecutionPolicy Bypass -File\
        \ .\\\\setup.ps1\n\nWrite-Host \"[CF] Challenge killchain-004-supply-chain-domain\
        \ deployed successfully.\""
