id: killchain-001-web-to-ad
name: Web Pivot to Domain Compromise
description: APT-style kill chain from web foothold to AD dominance.
content_type: killchain
domain: Complete Cyber Kill Chain Scenario (Recon to Action on Objective)
difficulty: hard
tactic: execution
technique:
  attack_id: T1059.004
  name: Unix Shell
gitlab:
  repo_url: https://gitlab.example.com/cyberforge/cyberforge-content.git
  content_path: killchains/killchain-001-web-to-ad
vulnerabilities:
- Initial Access via vulnerable upload endpoint
- Privilege Escalation using misconfigured sudoers
- Credential Dumping from compromised workstation
- Lateral Movement via SMB and WinRM
- Domain Privilege Escalation via ADCS misconfiguration
machines:
- machine_id: web01
  os: linux
  setup_script: web01_setup.sh
  stack: docker
  role: Web server — runs vulnerable upload app
  health_check: curl -sf http://localhost:8080/health || exit 1
- machine_id: pivot01
  os: linux
  setup_script: pivot01_setup.sh
  stack: none
  role: Linux pivot host with misconfigured sudoers
  health_check: ''
- machine_id: ws01
  os: windows
  setup_script: ws01_setup.ps1
  stack: none
  role: Windows workstation for credential dumping
  health_check: ''
- machine_id: dc01
  os: windows
  setup_script: dc01_setup.ps1
  stack: ad
  role: Domain controller with ADCS misconfiguration
  health_check: (Get-ADDomain).DNSRoot
platforms:
  linux:
    sh:
      command: "set -e\necho '[CF] CyberForge challenge deploy starting: killchain-001-web-to-ad'\n\
        \n# --- Authenticate to GitLab ---\nGITLAB_TOKEN=\"${GITLAB_TOKEN:-#{gitlab.token}}\"\
        \nREPO_URL=\"${REPO_URL:-https://gitlab.example.com/cyberforge/cyberforge-content.git}\"\
        \n\n# Inject token into URL if provided\nif [ -n \"$GITLAB_TOKEN\" ] && [\
        \ \"$GITLAB_TOKEN\" != \"#{gitlab.token}\" ]; then\n  REPO_AUTH_URL=\"$(echo\
        \ \"$REPO_URL\" | sed \"s|https://|https://oauth2:${GITLAB_TOKEN}@|\")\"\n\
        else\n  REPO_AUTH_URL=\"$REPO_URL\"\nfi\n\n# --- Sparse-checkout only the\
        \ challenge directory ---\nWORKDIR=\"/opt/cyberforge/killchain-001-web-to-ad\"\
        \nif [ -d \"$WORKDIR/.git\" ]; then\n  echo '[CF] Updating existing clone...'\n\
        \  git -C \"$WORKDIR\" pull --ff-only\nelse\n  mkdir -p \"$WORKDIR\"\n  git\
        \ clone --depth 1 --filter=blob:none --sparse \"$REPO_AUTH_URL\" \"$WORKDIR\"\
        \n  git -C \"$WORKDIR\" sparse-checkout set \"killchains/killchain-001-web-to-ad\"\
        \nfi\n\n# --- Change into challenge directory ---\ncd \"$WORKDIR/killchains/killchain-001-web-to-ad\"\
        \n\n# --- Run challenge setup ---\nchmod +x setup.sh\n./setup.sh\n\necho '[CF]\
        \ Challenge killchain-001-web-to-ad deployed successfully.'"
  windows:
    psh:
      command: "$ErrorActionPreference = \"Stop\"\nWrite-Host \"[CF] CyberForge challenge\
        \ deploy starting: killchain-001-web-to-ad\"\n\n# --- Authenticate to GitLab\
        \ ---\n$GitlabToken = if ($env:GITLAB_TOKEN) { $env:GITLAB_TOKEN } elseif\
        \ (\"#{gitlab.token}\" -ne \"#{gitlab.token}\") { \"#{gitlab.token}\" } else\
        \ { \"\" }\n$RepoUrl = if ($env:REPO_URL) { $env:REPO_URL } else { \"https://gitlab.example.com/cyberforge/cyberforge-content.git\"\
        \ }\n\nif ($GitlabToken) {\n  $RepoAuthUrl = $RepoUrl -replace \"https://\"\
        , \"https://oauth2:$($GitlabToken)@\"\n} else {\n  $RepoAuthUrl = $RepoUrl\n\
        }\n\n# --- Sparse-checkout only the challenge directory ---\n$WorkDir = \"\
        C:\\\\CyberForge\\\\killchain-001-web-to-ad\"\nif (Test-Path \"$WorkDir\\\
        .git\") {\n  Write-Host '[CF] Updating existing clone...'\n  git -C $WorkDir\
        \ pull --ff-only\n} else {\n  New-Item -ItemType Directory -Force -Path $WorkDir\
        \ | Out-Null\n  git clone --depth 1 --filter=blob:none --sparse $RepoAuthUrl\
        \ $WorkDir\n  git -C $WorkDir sparse-checkout set \"killchains/killchain-001-web-to-ad\"\
        \n}\n\n# --- Change into challenge directory ---\nSet-Location \"$WorkDir\\\
        \\killchains\\\\killchain-001-web-to-ad\"\n\n# --- Run challenge setup ---\n\
        powershell -ExecutionPolicy Bypass -File .\\\\setup.ps1\n\nWrite-Host \"[CF]\
        \ Challenge killchain-001-web-to-ad deployed successfully.\""
